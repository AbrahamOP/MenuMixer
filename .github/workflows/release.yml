name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (ex: 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Patch project version
        run: |
          sed -i '' "s/MARKETING_VERSION: \".*\"/MARKETING_VERSION: \"${{ steps.version.outputs.version }}\"/" project.yml
          xcodegen generate

      - name: Build & create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CI: "true"
        run: |
          chmod +x create-dmg.sh
          ./create-dmg.sh

      - name: Locate DMG
        id: dmg
        run: |
          DMG_PATH=$(ls build/MenuMixer-*.dmg | head -1)
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$DMG_PATH")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MenuMixer ${{ steps.version.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation (automatique)

            1. Télécharge **`${{ steps.dmg.outputs.name }}`** ci-dessous.
            2. Double-clique le `.dmg` pour l'ouvrir.
            3. Double-clique sur **`Installer.command`** dans la fenêtre.
               - Au premier lancement, macOS peut demander confirmation : **clic droit** sur `Installer.command` → **Ouvrir**.
               - Le script copie l'app dans `/Applications`, retire le flag de quarantaine, et lance MenuMixer.
            4. Autorise la capture audio au premier clic sur l'icône (indispensable).

            ## Installation manuelle (alternative)

            Glisse l'app dans `/Applications`, puis depuis le Terminal :
            ```bash
            xattr -cr "/Applications/MenuMixer.app"
            ```

            ## Pourquoi ce script ?

            L'app est signée en ad-hoc (gratuit, pas de compte développeur Apple payant). Sans cela, macOS bloque avec le message **« MenuMixer est endommagé »** sur les fichiers téléchargés. Le code source est public et auditable dans ce repo.

            Voir le [README](https://github.com/${{ github.repository }}#readme) pour plus de détails.
          files: ${{ steps.dmg.outputs.path }}
