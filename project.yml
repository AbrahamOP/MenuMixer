name: MelangeurDeSon
options:
  bundleIdPrefix: com.melangeurDeSon
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  MelangeurDeSon:
    type: application
    platform: macOS
    sources:
      - Sources/MelangeurDeSon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.melangeurDeSon.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        CODE_SIGN_STYLE: Manual
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_NAME: "Mélangeur de Son"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: true
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    entitlements:
      path: Resources/MelangeurDeSon.entitlements
